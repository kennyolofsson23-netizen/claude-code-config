name: Tests

on:
  push:
    branches: [test-infrastructure, main]
  pull_request:
    branches: [main]

jobs:
  js-tests:
    name: JS Hook Tests
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run JS hook tests
        run: npm test

  py-tests:
    name: Python Hook Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest pyyaml

      - name: Run Python hook tests
        run: python -m pytest tests/hooks/py/ -v
